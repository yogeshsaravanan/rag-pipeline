<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Dual-Stream RAG Pipeline Architecture</title>
  <desc>FastAPI service with CDC sync to ChromaDB, Ollama LLM, and SQLite</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- HTTP Client -->
  <rect x="270" y="20" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="340" y="44" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" font-family="sans-serif">HTTP Client</text>
  <line x1="340" y1="64" x2="340" y2="108" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- FastAPI -->
  <rect x="220" y="110" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="340" y="131" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489" font-family="sans-serif">FastAPI</text>
  <text x="340" y="151" text-anchor="middle" font-size="12" fill="#534AB7" font-family="sans-serif">/orders · /upload-doc · /query · /health</text>

  <!-- Arrows FastAPI → services -->
  <path d="M280 166 L125 228" fill="none" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="340" y1="166" x2="340" y2="228" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
  <path d="M400 166 L555 228" fill="none" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- CDC Service -->
  <rect x="40" y="230" width="170" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
  <text x="125" y="251" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13" font-family="sans-serif">CDC service</text>
  <text x="125" y="271" text-anchor="middle" font-size="12" fill="#993C1D" font-family="sans-serif">ORM hooks → vector sync</text>

  <!-- Ingestion Service -->
  <rect x="255" y="230" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="340" y="251" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" font-family="sans-serif">Ingestion service</text>
  <text x="340" y="271" text-anchor="middle" font-size="12" fill="#0F6E56" font-family="sans-serif">Chunk · embed · upsert</text>

  <!-- RAG Service -->
  <rect x="470" y="230" width="170" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="555" y="251" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C" font-family="sans-serif">RAG service</text>
  <text x="555" y="271" text-anchor="middle" font-size="12" fill="#185FA5" font-family="sans-serif">Rewrite · retrieve · generate</text>

  <!-- Ollama service -->
  <rect x="255" y="355" width="170" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="340" y="375" text-anchor="middle" font-size="14" font-weight="500" fill="#633806" font-family="sans-serif">Ollama service</text>
  <text x="340" y="395" text-anchor="middle" font-size="12" fill="#854F0B" font-family="sans-serif">embed() · chat_completion()</text>

  <!-- Arrows → Ollama service -->
  <path d="M152 286 L300 353" fill="none" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="340" y1="286" x2="340" y2="353" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
  <path d="M528 286 L385 353" fill="none" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- SQLite -->
  <rect x="40" y="475" width="170" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="125" y="496" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" font-family="sans-serif">SQLite</text>
  <text x="125" y="516" text-anchor="middle" font-size="12" fill="#5F5E5A" font-family="sans-serif">orders table</text>

  <!-- ChromaDB -->
  <rect x="255" y="475" width="170" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.8"/>
  <text x="340" y="496" text-anchor="middle" font-size="14" font-weight="500" fill="#173404" font-family="sans-serif">ChromaDB</text>
  <text x="340" y="516" text-anchor="middle" font-size="12" fill="#3B6D11" font-family="sans-serif">user_data_stream · knowledge_base</text>

  <!-- Ollama container -->
  <rect x="470" y="475" width="170" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="555" y="496" text-anchor="middle" font-size="14" font-weight="500" fill="#633806" font-family="sans-serif">Ollama container</text>
  <text x="555" y="516" text-anchor="middle" font-size="12" fill="#854F0B" font-family="sans-serif">llama3.2 · nomic-embed-text</text>

  <!-- Storage arrows -->
  <path d="M125 286 L125 473" fill="none" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
  <path d="M210 303 Q230 390 255 473" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M503 286 Q420 380 425 473" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M340 411 L340 473" fill="none" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
  <path d="M425 411 L518 473" fill="none" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- Docker boundary -->
  <rect x="22" y="95" width="636" height="455" rx="12" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="630" y="112" text-anchor="end" font-size="11" fill="#888" font-family="sans-serif">docker-compose boundary</text>

  <!-- Legend -->
  <line x1="42" y1="575" x2="70" y2="575" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
  <text x="76" y="579" font-size="11" fill="#888" font-family="sans-serif">sync / call</text>
  <line x1="160" y1="575" x2="188" y2="575" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="194" y="579" font-size="11" fill="#888" font-family="sans-serif">vector query / upsert</text>
</svg>
